name: CI  # 工作流名称：CI（持续集成）

on:
  # 手动触发配置 - 允许在 GitHub UI 中手动执行此工作流
  workflow_dispatch:
  
  # 自动触发配置 - 当满足以下条件时自动运行
  push:
    # 仅当推送到指定分支时触发
    branches: [ "feat/new_download" ]
    
    # 路径忽略规则 - 仅包含 Markdown 文件的更改不会触发工作流
    paths-ignore:
      - "**.md"  # 忽略所有 .md 后缀的文件

jobs:
  build:  # 构建任务
    runs-on: ubuntu-latest  # 使用最新版 Ubuntu 运行器

    steps:
      # 步骤1：检出代码库
      - name: Checkout
        uses: actions/checkout@v4  # 使用官方 checkout 动作

      # 步骤2：设置 Java 开发环境
      - name: Set up JDK 21
        uses: actions/setup-java@v4  # 使用官方 Java 设置动作
        with:
          java-version: '21'         # 指定 JDK 21
          distribution: 'temurin'     # 使用 Eclipse Temurin 发行版
          cache: gradle               # 启用 Gradle 依赖缓存

      # 步骤3：加载 Google 服务配置文件
      - name: Load Google Services File
        env:
          # 从 GitHub Secrets 获取 Base64 编码的配置文件
          DATA: ${{ secrets.HA1_GOOGLE_SERVICES_JSON_BASE64 }}
        # 解码并写入项目目录
        run: echo $DATA | base64 -di > app/google-services.json

      # 步骤4：授予 Gradle 包装脚本执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew  # Linux 系统需要显式添加执行权限

      # 步骤5：构建并签名 APK
      - name: Build and sign APK with Gradle
        run: ./gradlew assembleRelease  # 执行 Gradle 发布构建任务
        env:
          # 从 Secrets 获取签名所需的安全凭证
          HA1_KEYSTORE_PASSWORD: ${{ secrets.HA1_KEYSTORE_PASSWORD }}
          HA1_GITHUB_TOKEN: ${{ secrets.HA1_GITHUB_TOKEN }}
          # 向构建系统传递环境变量（用于版本控制）
          HA1_VERSION_SOURCE: 'ci'

      # 步骤6：上传构建产物
      - name: Upload APK Zip
        uses: actions/upload-artifact@v4  # 使用官方上传动作
        with:
          # 生成包含 commit SHA 的唯一文件名
          name: app-release-${{ github.sha }}
          # 匹配构建生成的 APK 文件
          path: app/build/outputs/apk/release/Han1meViewer-v*.apk
